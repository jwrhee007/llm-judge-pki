# =============================================================================
# LLM-as-Judge PKI Study Configuration
# =============================================================================

# --- Model Settings ---
model:
  judge: "gpt-4o-mini-2024-07-18"       # Primary judge model (Exp. 2)
  ner_tagger: "gpt-4o-2024-08-06"       # NER tagging model (Lee et al. 동일)
  probe_answer_checker: "gpt-4o-mini-2024-07-18"  # Probe answer matching
  temperature: 0                          # Greedy decoding
  seed: 42                               # Reproducibility
  max_tokens_probe: 256                  # Knowledge Probe 응답 길이
  max_tokens_ner: 16                     # NER 태그 응답 길이
  max_tokens_match: 8                    # Answer match 응답 길이
  max_tokens_judge: 16                   # Judge verdict 응답 길이 (Standard/Direct)
  max_tokens_judge_cot: 512              # Judge verdict 응답 길이 (CoT)

# --- Data Settings ---
data:
  dataset: "triviaqa"                    # "triviaqa" or "nq"
  subset: "rc"                           # TriviaQA: "rc", NQ: "full"
  split: "validation"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  # Pipeline outputs
  stage1_file: "data/processed/triviaqa_rc_evidence_present.jsonl"
  curated_file: "data/processed/triviaqa_rc_curated.jsonl"
  sampled_file: "data/processed/triviaqa_rc_sampled.jsonl"

# --- Sampling Settings ---
sampling:
  strategy: "random"                     # "random" (Lee et al. 방식) or "stratified"
  target_total: 1000                     # 목표 총 문항 수 (Lee et al. 동일)
  random_seed: 42
  # 층화 추출 전용 설정 (strategy: stratified일 때만 사용)
  max_per_ner_tag: 20                    # NER 태그별 최대 문항 수
  # 사후 층화 분석 설정 (strategy: random일 때 사용)
  min_per_ner_tag_for_analysis: 15       # 이 이상인 태그만 개별 분석, 미만은 OTHER로 묶음
  # 대상 NER 태그
  target_ner_tags:
    - PERSON
    - ORG
    - GPE
    - LOC
    - DATE
    - CARDINAL
    - QUANTITY
    - EVENT
    - WORK_OF_ART
    - PRODUCT
    - NORP
    - FAC
    - LANGUAGE
    - ORDINAL

# --- Knowledge Probe Settings (Exp. 2-0) ---
probe:
  n_trials: 3                           # Self-consistency 시행 횟수
  methods: ["A", "B"]                    # 방식 A (bare) / 방식 B (knowledge-eliciting)
  temperature: 0.6                       # Self-consistency용 sampling temperature
  batch_size: 50                         # API 동시 호출 배치 크기
  output_dir: "results/probe"

# --- Judge Experiment Settings (Exp. 2-1 ~ 2-3) ---
judge:
  n_trials: 30                           # 반복 횟수 (verdict entropy 측정)
  output_dir: "results"                  # 실험별 하위 디렉토리 자동 생성

# --- API Settings ---
api:
  max_retries: 5
  retry_min_wait: 1                      # seconds
  retry_max_wait: 60                     # seconds
  requests_per_minute: 500               # Rate limiting
  batch_api: true                        # OpenAI Batch API 사용 여부
  batch_output_dir: "data/batch_outputs"
  batch_chunk_size: 5000                 # Batch 분할 크기 (requests 수 기준, 토큰 리밋 회피)
  batch_chunk_size: 5000                 # 배치당 최대 요청 수 (토큰 한도 방지)

# --- Logging ---
logging:
  level: "INFO"
  log_dir: "logs"
  log_file: "experiment.log"
